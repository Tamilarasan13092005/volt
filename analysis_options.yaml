# VolunteerSync — Dart Analysis Options
# This file configures flutter analyze behavior.
# Rules here help catch bugs and enforce code quality.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat these as errors (build fails if violated)
  errors:
    # Unused imports slow down compile time and are code smell
    unused_import: warning
    # Dead code is a sign of bugs or incomplete refactoring
    dead_code: warning
    # Type safety errors should always be caught
    invalid_assignment: error
    # Missing returns are bugs
    missing_return: error

  exclude:
    # Don't analyze generated files
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - ".dart_tool/**"

linter:
  rules:
    # ── Code Quality ────────────────────────────────────────────────────────
    # Avoid print statements in production code
    avoid_print: true

    # Prefer const constructors (better performance)
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true

    # Use single quotes for consistency
    prefer_single_quotes: false   # Your code uses single quotes already

    # Avoid empty catch blocks (silently swallowing errors is dangerous)
    empty_catches: true

    # Always declare types for public APIs
    always_declare_return_types: true

    # Use 'is!' instead of '!(x is Type)'
    prefer_is_not_operator: true

    # Avoid unnecessary null checks
    unnecessary_null_checks: true

    # ── Flutter Specific ────────────────────────────────────────────────────
    # Use SizedBox instead of Container for whitespace
    sized_box_for_whitespace: true

    # Avoid unnecessary containers
    avoid_unnecessary_containers: true

    # Use key in constructors for testability
    use_key_in_widget_constructors: false  # Already handled manually
