name: Load test report

# ─── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
  pull_request:
  workflow_dispatch:          # allow manual trigger from GitHub UI
    inputs:
      suite:
        description: "Which suite to run"
        required: false
        default: "all"
        type: choice
        options: [all, appium, selenium, vulnerability, load]

# ─── Concurrency: cancel outdated runs on the same branch ──────────────────────
concurrency:
  group: e2e-reports-${{ github.ref }}
  cancel-in-progress: true

# ─── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: read
  actions: write          # needed to upload/download artifacts

# ─── Global env ────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"
  TEST_DIR: volunteersync/test
  REPORTS_DIR: volunteersync/test/e2e/reports
  BASE_URL: https://tamilarasan13092005.github.io/volunteersync/

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Load E2E Report
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  load-e2e:
    name: ⚡ Load E2E Report
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Node setup ───────────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.TEST_DIR }}/package-lock.json

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: 📦 Install E2E dependencies
        run: npm ci
        working-directory: ${{ env.TEST_DIR }}

      # ── Create reports dir ───────────────────────────────────────────────────
      - name: 📁 Ensure reports directory exists
        run: mkdir -p ${{ env.REPORTS_DIR }}

      # ── Run Load E2E Tests ───────────────────────────────────────────────────
      - name: ⚡ Run Load E2E Tests
        id: load_run
        run: node e2e/load_runner.js
        working-directory: ${{ env.TEST_DIR }}
        env:
          CI: "true"

      # ── Stamp report with commit metadata ────────────────────────────────────
      - name: 🏷️ Annotate report with commit info
        if: always()
        run: |
          echo "Branch  : ${{ github.ref_name }}"             >> ${{ env.REPORTS_DIR }}/load_run_info.txt
          echo "Commit  : ${{ github.sha }}"                  >> ${{ env.REPORTS_DIR }}/load_run_info.txt
          echo "Actor   : ${{ github.actor }}"                >> ${{ env.REPORTS_DIR }}/load_run_info.txt
          echo "Run #   : ${{ github.run_number }}"           >> ${{ env.REPORTS_DIR }}/load_run_info.txt
          echo "Trigger : ${{ github.event_name }}"           >> ${{ env.REPORTS_DIR }}/load_run_info.txt
          echo "Time    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')">> ${{ env.REPORTS_DIR }}/load_run_info.txt

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: 📤 Upload Load Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Load test report
          path: |
            ${{ env.REPORTS_DIR }}/load_test_report.xlsx
            ${{ env.REPORTS_DIR }}/load_run_info.txt
          retention-days: 90
          if-no-files-found: warn

      # ── Print summary to GitHub Step Summary ─────────────────────────────────
      - name: 📝 Write Load summary to job summary
        if: always()
        run: |
          echo "## ⚡ Load E2E Report — Run \`#${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | \`${{ github.actor }}\` via \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Report | \`load_test_report.xlsx\` (download from Artifacts ↑) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ Load E2E benchmark completed — 400 test cases across 11 screens." >> $GITHUB_STEP_SUMMARY
