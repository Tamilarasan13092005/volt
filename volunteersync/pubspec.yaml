name: volunteersync
description: A premium volunteer management SaaS platform with AI capabilities.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # UI & Design
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.6

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Syne
      fonts:
        - asset: fonts/Syne-Regular.ttf
        - asset: fonts/Syne-Medium.ttf
        - asset: fonts/Syne-SemiBold.ttf
        - asset: fonts/Syne-Bold.ttf
        - asset: fonts/Syne-ExtraBold.ttf