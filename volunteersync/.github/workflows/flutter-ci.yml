name: VolunteerSync — CI & Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Global read-only; deploy job overrides with write
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1 — Flutter: Analyze & Unit/Widget Tests
  # ─────────────────────────────────────────────────────────────────
  test:
    name: 🔍 Analyze & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter 3.44.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (advisory)
        run: flutter format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      - name: Run unit & widget tests
        run: flutter test --reporter=github

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — Flutter Integration Tests (headless Chrome)
  # ─────────────────────────────────────────────────────────────────
  integration_test:
    name: 🌐 Flutter Integration Tests (Web)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter 3.44.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start ChromeDriver
        run: |
          chromedriver --port=4444 &
          sleep 2

      - name: Run Integration Tests on Web
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_test.dart \
            -d web-server \
            --browser-name=chrome \
            --headless
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # JOB 3 — Selenium E2E Tests (Simulation + Real headless Chrome)
  # ─────────────────────────────────────────────────────────────────
  selenium_tests:
    name: 🧪 Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: selenium_tests/package-lock.json

      - name: Install Selenium dependencies
        run: npm ci
        working-directory: selenium_tests

      - name: Create reports directory
        run: mkdir -p selenium_tests/reports/screenshots

      - name: Run Selenium simulation (100 test cases)
        run: node run_simulator.js
        working-directory: selenium_tests

      - name: Upload Selenium Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report-${{ github.run_number }}
          path: selenium_tests/reports/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 4 — Appium Mobile Tests (Simulation — Android)
  # ─────────────────────────────────────────────────────────────────
  appium_tests:
    name: 📱 Appium Mobile Tests (Android Simulation)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: appium_tests/package-lock.json

      - name: Install Appium test dependencies
        run: npm ci
        working-directory: appium_tests

      - name: Create reports directory
        run: mkdir -p appium_tests/reports

      - name: Run Appium simulation (100 test cases)
        run: node run_simulator.js
        working-directory: appium_tests

      - name: Upload Appium Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-report-${{ github.run_number }}
          path: appium_tests/reports/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 5 — Selenium Real Tests vs. Deployed Site (post-deploy only)
  # Runs against the live GitHub Pages URL after deploy completes
  # ─────────────────────────────────────────────────────────────────
  selenium_real:
    name: 🌍 Selenium Real Tests (vs. Live Site)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: selenium_tests/package-lock.json

      - name: Install Selenium dependencies
        run: npm ci
        working-directory: selenium_tests

      - name: Install Chrome & ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Create reports directory
        run: mkdir -p selenium_tests/reports/screenshots

      - name: Run Selenium E2E against deployed site
        run: |
          # Point tests at the live GitHub Pages URL
          BASE_URL=https://tamilarasan13092005.github.io/volunteersync/ \
          HEADLESS=true \
          node e2e_test.js
        working-directory: selenium_tests
        continue-on-error: true
        env:
          BASE_URL: https://tamilarasan13092005.github.io/volunteersync/
          HEADLESS: "true"

      - name: Upload real Selenium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-real-report-${{ github.run_number }}
          path: selenium_tests/reports/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 6 — Build Flutter Web (only on push to main)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Web Release
    runs-on: ubuntu-latest
    needs: [test, integration_test, selenium_tests, appium_tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter 3.44.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --base-href "/volunteersync/" \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Add .nojekyll (prevent Jekyll processing)
        run: touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # ─────────────────────────────────────────────────────────────────
  # JOB 7 — Deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
